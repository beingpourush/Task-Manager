<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TaskFlow</title>
<style>
/* ===== VARIABLES ===== */
:root {
  --bg:        #0f0f11;
  --surface:   #1a1a1f;
  --surface2:  #222228;
  --border:    #2e2e36;
  --accent:    #c8f04a;
  --accent-dim:#9db83a;
  --text:      #f0efe8;
  --muted:     #7a7a8a;
  --danger:    #ff5d6a;
  --green:     #4ade80;
  --r:         14px;
}

/* ===== RESET ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
ul{list-style:none}
button{cursor:pointer;border:none;background:none;font-family:inherit}
input{font-family:inherit}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Segoe UI', system-ui, sans-serif;
  font-size: 15px;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  padding: 0 16px 60px;
}

.app {
  width: 100%;
  max-width: 540px;
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 36px 0 20px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 28px;
}
.logo {
  font-size: 22px;
  font-weight: 800;
  letter-spacing: -0.5px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.dot {
  width: 11px; height: 11px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 10px var(--accent);
}
.stats {
  font-size: 13px;
  color: var(--muted);
}

/* INPUT ROW */
.input-row {
  display: flex;
  gap: 10px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 6px 6px 6px 18px;
  transition: border-color .2s, box-shadow .2s;
  margin-bottom: 16px;
}
.input-row:focus-within {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(200,240,74,.1);
}
.input-row input {
  flex: 1;
  background: none;
  border: none;
  outline: none;
  color: var(--text);
  font-size: 15px;
  padding: 8px 0;
}
.input-row input::placeholder { color: var(--muted); }
.add-btn {
  width: 42px; height: 42px;
  background: var(--accent);
  color: #0f0f11;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  font-weight: 300;
  flex-shrink: 0;
  transition: background .15s, transform .1s;
  line-height: 1;
}
.add-btn:hover  { background: var(--accent-dim); }
.add-btn:active { transform: scale(.95); }

/* FILTER TABS */
.tabs {
  display: flex;
  gap: 4px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 4px;
  margin-bottom: 16px;
}
.tab {
  flex: 1;
  padding: 8px;
  font-size: 13px;
  font-weight: 500;
  color: var(--muted);
  border-radius: 7px;
  transition: background .15s, color .15s;
}
.tab:hover { color: var(--text); }
.tab.active {
  background: var(--surface2);
  color: var(--text);
  border: 1px solid var(--border);
}

/* TASK LIST */
.task-list { display: flex; flex-direction: column; gap: 8px; }

.task-item {
  display: flex;
  align-items: center;
  gap: 12px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 14px 16px;
  transition: border-color .2s, opacity .2s;
  animation: slideIn .18s ease-out;
}
@keyframes slideIn {
  from { opacity:0; transform:translateY(-5px); }
  to   { opacity:1; transform:translateY(0); }
}
.task-item:hover { border-color: #3e3e48; }
.task-item.done  { opacity: .5; }
.task-item.done .task-text { text-decoration: line-through; color: var(--muted); }

/* Checkbox */
.cb {
  width: 22px; height: 22px;
  border-radius: 6px;
  border: 2px solid var(--border);
  flex-shrink: 0;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: border-color .15s, background .15s;
  font-size: 13px;
  color: transparent;
}
.cb:hover { border-color: var(--accent); }
.cb.checked {
  background: var(--green);
  border-color: var(--green);
  color: #0f0f11;
  font-size: 12px;
}

.task-text {
  flex: 1;
  word-break: break-word;
  line-height: 1.45;
}

/* Action buttons */
.actions {
  display: flex;
  gap: 4px;
  opacity: 0;
  transition: opacity .15s;
}
.task-item:hover .actions { opacity: 1; }

.act-btn {
  width: 30px; height: 30px;
  border-radius: 7px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--muted);
  font-size: 16px;
  transition: background .15s, color .15s;
}
.act-btn:hover { background: var(--surface2); color: var(--text); }
.del-btn:hover { color: var(--danger) !important; }
.edit-btn:hover { color: var(--accent) !important; }

/* EMPTY STATE */
.empty {
  text-align: center;
  padding: 56px 20px;
  color: var(--muted);
  font-size: 14px;
}
.empty-icon { font-size: 32px; margin-bottom: 12px; opacity: .4; }

/* FOOTER */
.footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 16px;
  padding: 0 4px;
  min-height: 24px;
}
.rem { font-size: 13px; color: var(--muted); }
.clear-btn {
  font-size: 13px;
  color: var(--muted);
  padding: 4px 10px;
  border-radius: 6px;
  transition: color .15s, background .15s;
}
.clear-btn:hover { color: var(--danger); background: rgba(255,93,106,.08); }

/* MODAL */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.75);
  backdrop-filter: blur(4px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
  padding: 20px;
}
.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 28px 24px 24px;
  width: 100%;
  max-width: 420px;
  box-shadow: 0 16px 48px rgba(0,0,0,.6);
  animation: popIn .2s cubic-bezier(.34,1.56,.64,1);
}
@keyframes popIn {
  from { opacity:0; transform:scale(.95); }
  to   { opacity:1; transform:scale(1); }
}
.modal h2 { font-size: 18px; font-weight: 700; margin-bottom: 16px; }
.modal .input-row { margin-bottom: 0; }
.modal-btns {
  display: flex;
  gap: 10px;
  justify-content: flex-end;
  margin-top: 18px;
}
.btn-primary {
  background: var(--accent);
  color: #0f0f11;
  font-size: 14px;
  font-weight: 600;
  padding: 10px 22px;
  border-radius: 9px;
  transition: background .15s;
}
.btn-primary:hover { background: var(--accent-dim); }
.btn-sec {
  background: var(--surface2);
  color: var(--muted);
  font-size: 14px;
  padding: 10px 18px;
  border-radius: 9px;
  border: 1px solid var(--border);
  transition: color .15s;
}
.btn-sec:hover { color: var(--text); }

.hidden { display: none !important; }
</style>
</head>
<body>

<div class="app">
  <!-- Header -->
  <header class="header">
    <div class="logo"><span class="dot"></span> TaskFlow</div>
    <div class="stats" id="stats">0 tasks</div>
  </header>

  <!-- Add Task -->
  <div class="input-row">
    <input id="taskInput" type="text" placeholder="What needs to be done?" maxlength="120" autocomplete="off"/>
    <button class="add-btn" id="addBtn" title="Add task">+</button>
  </div>

  <!-- Filters -->
  <div class="tabs">
    <button class="tab active" data-f="all">All</button>
    <button class="tab" data-f="active">Active</button>
    <button class="tab" data-f="done">Completed</button>
  </div>

  <!-- List -->
  <ul class="task-list" id="list"></ul>
  <div class="empty hidden" id="empty">
    <div class="empty-icon">✦</div>
    <p>Nothing here yet.</p>
  </div>

  <!-- Footer -->
  <div class="footer">
    <span class="rem" id="rem"></span>
    <button class="clear-btn hidden" id="clearBtn">Clear completed</button>
  </div>
</div>

<!-- Edit Modal -->
<div class="overlay hidden" id="overlay">
  <div class="modal">
    <h2>Edit Task</h2>
    <div class="input-row">
      <input id="editInput" type="text" maxlength="120"/>
    </div>
    <div class="modal-btns">
      <button class="btn-sec" id="cancelBtn">Cancel</button>
      <button class="btn-primary" id="saveBtn">Save</button>
    </div>
  </div>
</div>

<script>
// ── State ──────────────────────────────────────────
let tasks = JSON.parse(localStorage.getItem('tf') || '[]');
let filter = 'all';
let editId = null;

// ── DOM ────────────────────────────────────────────
const taskInput = document.getElementById('taskInput');
const addBtn    = document.getElementById('addBtn');
const list      = document.getElementById('list');
const empty     = document.getElementById('empty');
const stats     = document.getElementById('stats');
const rem       = document.getElementById('rem');
const clearBtn  = document.getElementById('clearBtn');
const overlay   = document.getElementById('overlay');
const editInput = document.getElementById('editInput');
const saveBtn   = document.getElementById('saveBtn');
const cancelBtn = document.getElementById('cancelBtn');
const tabs      = document.querySelectorAll('.tab');

// ── Helpers ────────────────────────────────────────
function save() { localStorage.setItem('tf', JSON.stringify(tasks)); }
function uid()  { return Date.now().toString(36) + Math.random().toString(36).slice(2); }
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── Actions ────────────────────────────────────────
function addTask() {
  const text = taskInput.value.trim();
  if (!text) { taskInput.focus(); return; }
  tasks.unshift({ id: uid(), text, done: false });
  taskInput.value = '';
  save(); render(); taskInput.focus();
}

function toggleTask(id) {
  const t = tasks.find(t => t.id === id);
  if (t) { t.done = !t.done; save(); render(); }
}

function deleteTask(id) {
  tasks = tasks.filter(t => t.id !== id);
  save(); render();
}

function openEdit(id) {
  const t = tasks.find(t => t.id === id);
  if (!t) return;
  editId = id;
  editInput.value = t.text;
  overlay.classList.remove('hidden');
  editInput.focus();
  editInput.select();
}

function saveEdit() {
  const text = editInput.value.trim();
  if (!text) return;
  const t = tasks.find(t => t.id === editId);
  if (t) { t.text = text; save(); render(); }
  closeModal();
}

function closeModal() {
  overlay.classList.add('hidden');
  editId = null;
}

function clearDone() {
  tasks = tasks.filter(t => !t.done);
  save(); render();
}

// ── Render ────────────────────────────────────────
function render() {
  const total = tasks.length;
  const doneCount = tasks.filter(t => t.done).length;
  const activeCount = total - doneCount;

  const visible = tasks.filter(t =>
    filter === 'active' ? !t.done :
    filter === 'done'   ?  t.done : true
  );

  stats.textContent = total === 0 ? 'No tasks' : `${total} task${total !== 1 ? 's' : ''}`;
  rem.textContent   = activeCount > 0 ? `${activeCount} remaining` : total > 0 ? 'All done 🎉' : '';
  clearBtn.classList.toggle('hidden', doneCount === 0);
  empty.classList.toggle('hidden', visible.length > 0);

  list.innerHTML = '';
  visible.forEach(t => {
    const li = document.createElement('li');
    li.className = 'task-item' + (t.done ? ' done' : '');
    li.innerHTML = `
      <div class="cb ${t.done ? 'checked' : ''}" data-id="${t.id}" data-act="toggle">✓</div>
      <span class="task-text">${esc(t.text)}</span>
      <div class="actions">
        <button class="act-btn edit-btn" data-id="${t.id}" data-act="edit" title="Edit">✏️</button>
        <button class="act-btn del-btn"  data-id="${t.id}" data-act="del"  title="Delete">🗑</button>
      </div>
    `;
    list.appendChild(li);
  });
}

// ── Event Listeners ───────────────────────────────
addBtn.addEventListener('click', addTask);
taskInput.addEventListener('keydown', e => { if (e.key === 'Enter') addTask(); });

list.addEventListener('click', e => {
  const el  = e.target.closest('[data-act]');
  if (!el) return;
  const id  = el.dataset.id;
  const act = el.dataset.act;
  if (act === 'toggle') toggleTask(id);
  if (act === 'edit')   openEdit(id);
  if (act === 'del')    deleteTask(id);
});

tabs.forEach(tab => {
  tab.addEventListener('click', () => {
    tabs.forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    filter = tab.dataset.f;
    render();
  });
});

clearBtn.addEventListener('click', clearDone);
saveBtn.addEventListener('click', saveEdit);
cancelBtn.addEventListener('click', closeModal);
editInput.addEventListener('keydown', e => {
  if (e.key === 'Enter')  saveEdit();
  if (e.key === 'Escape') closeModal();
});
overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });

// ── Init ──────────────────────────────────────────
render();
taskInput.focus();
</script>
</body>
</html>
